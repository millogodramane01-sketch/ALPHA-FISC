<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ALFA FISC POUR LES DÉBUTANTS - Logiciel de Mise en Page Pro</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            -webkit-print-color-adjust: exact; 
        }
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #2c3e50; 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }
        .no-print { 
            padding: 20px; 
            text-align: center; 
            background: #34495e; 
            color: white;
            position: sticky; 
            top: 0; 
            z-index: 9999; 
            border-bottom: 5px solid #27ae60;
        }
        .input-group { 
            margin-bottom: 10px; 
        }
        input[type="text"] { 
            width: 60%; 
            padding: 12px; 
            border-radius: 5px; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
        }
        textarea { 
            width: 95%; 
            height: 180px; 
            padding: 12px; 
            margin-top: 10px; 
            border-radius: 5px; 
            font-size: 14px; 
            font-family: monospace;
            line-height: 1.4;
        }
        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin: 5px; 
            color: white; 
            transition: 0.3s; 
        }
        .btn-gen { 
            background: #27ae60; 
        }
        .btn-pdf { 
            background: #2980b9; 
        }
        #document-container { 
            background: #1a1a1a; 
            padding: 40px 0; 
        }
        .page { 
            width: 210mm; 
            height: 297mm; 
            padding: 10mm; 
            margin: 0 auto 30px auto; 
            background: white; 
            position: relative; 
            overflow: hidden; 
            page-break-after: always;
        }
        .main-border {
            border: 8px double #000; 
            position: absolute;
            top: 10mm; 
            bottom: 10mm; 
            left: 10mm; 
            right: 10mm;
            padding: 12mm; 
            padding-bottom: 25mm; 
            display: flex; 
            flex-direction: column;
        }
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            font-size: 12px; 
            border-bottom: 1px solid #000; 
            margin-bottom: 10px; 
            padding-bottom: 5px;
        }
        .fb-link { 
            color: #000; 
        }
        .brand-top { 
            font-style: italic; 
        }
        .titre-cadre { 
            border: 3px solid #000; 
            padding: 15px; 
            text-align: center; 
            margin-bottom: 25px;
            background: #f9f9f9; 
            box-shadow: 4px 4px 0px #000;
        }
        .titre-cadre h1 { 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            font-weight: 700; 
        }
        .content-area { 
            flex-grow: 1; 
            position: relative; 
        }
        .question-box { 
            margin-bottom: 20px; 
        }
        .q-text { 
            font-weight: bold; 
            font-size: 16px; 
            display: block; 
            margin-bottom: 8px; 
            text-align: justify; 
            line-height: 1.5; 
        }
        .opt { 
            display: block; 
            font-size: 15px; 
            margin-left: 25px; 
            margin-bottom: 5px; 
            line-height: 1.4; 
        }
        .corr-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 20px; 
        }
        .corr-table td { 
            border: 2px solid black; 
            text-align: center; 
            padding: 8px; 
            font-weight: bold; 
        }
        .row-num { 
            background: #eee; 
            font-size: 12px; 
        }
        .row-ans td { 
            font-size: 20px; 
            color: #c0392b; 
        }
        .justif-section {
            margin-top: 10px;
            border-top: 2px dashed #000;
            padding-top: 15px;
        }
        .justif-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-decoration: underline;
        }
        .justif-item {
            font-size: 14px;
            margin-bottom: 12px;
            text-align: justify;
            line-height: 1.4;
        }
        .footer-brand { 
            text-align: center; 
            font-size: 12px; 
            margin-top: auto; 
            border-top: 1px solid #000; 
            padding-top: 5px; 
        }
        .page-number-box {
            position: absolute; 
            bottom: 5mm; 
            right: 5mm;
            border: 2px solid #000; 
            padding: 3px 10px;
            font-weight: bold; 
            font-size: 12px; 
            background: white;
        }
        @media print {
            .no-print { display: none; }
            body { background: white; }
            #document-container { padding: 0; background: none; }
            .page { margin: 0; border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <div class="input-group">
        <input type="text" id="titreExamen" placeholder="TITRE DE L'EXAMEN (Ex: CONCOURS ENAREF 2026)">
    </div>
    <textarea id="inputQCM" placeholder="Entrez vos questions ici..."></textarea>
    <div class="btns">
        <button class="btn-gen" onclick="engine()">VISUALISER LE DOCUMENT PRO</button>
        <button class="btn-pdf" onclick="window.print()">TELECHARGER / PDF</button>
    </div>
</div>

<div id="ghost-measure" style="width: 160mm; position: absolute; visibility: hidden; pointer-events: none;"></div>
<div id="document-container"></div>

<script>
function createPageElement(titreExamen, pageIndex, customTitle = "") {
    let pageDiv = document.createElement('div');
    pageDiv.className = 'page';
    
    let topHeaderTitle = customTitle ? `<h1>${customTitle}</h1>` : `<h1>${titreExamen}</h1>`;
    let headerTitre = (pageIndex === 1 || customTitle) ? `<div class="titre-cadre">${topHeaderTitle}</div>` : "";
    
    pageDiv.innerHTML = `
        <div class="main-border">
            <div class="header-top">
                <span class="fb-link">Page Facebook : ALFHA FISC POUR LES DÉBUTANTS</span>
                <span class="brand-top">WhatsApp : +226 66 47 70 70</span>
            </div>
            ${headerTitre}
            <div class="content-area"></div>
            <div class="footer-brand"><em>AVEC ALFA FISC, VISEZ L'EXCELLENCE</em></div>
            <div class="page-number-box">Page <span class="p-idx">${pageIndex}</span> / <span class="p-tot"></span></div>
        </div>`;
    return pageDiv;
}

function engine() {
    const titre = document.getElementById('titreExamen').value || "EXAMEN DE CULTURE GÉNÉRALE";
    const raw = document.getElementById('inputQCM').value;
    const container = document.getElementById('document-container');
    const ghost = document.getElementById('ghost-measure');
    
    container.innerHTML = "";
    if(!raw.trim()) return;

    const lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
    
    let rawBlocks = [];
    let currentBlock = null;
    let autoQuestionCount = 0;

    lines.forEach(line => {
        let isNumberedQuestion = /^\d+[\.\)\s]/i.test(line) || /^\d+$/i.test(line);
        let isOption = /^[A-E][\.\)\s]/i.test(line);
        let isResponse = line.toLowerCase().replace(/[éèêë]/g, 'e').includes("reponse");
        let isJustification = line.toLowerCase().includes("justification");

        // Si la ligne commence par un chiffre OU s'il s'agit d'un texte libre (non identifié comme option/réponse/justification)
        // alors on considère cela comme le début d'une nouvelle question
        if (isNumberedQuestion || (!isOption && !isResponse && !isJustification)) {
            if (currentBlock) rawBlocks.push(currentBlock);
            currentBlock = [];
            
            // Si la question n'a pas de numéro, on lui en attribue un automatiquement
            if (!isNumberedQuestion) {
                autoQuestionCount = rawBlocks.length + 1;
                line = autoQuestionCount + ". " + line;
            }
        }
        
        if (currentBlock) {
            currentBlock.push(line);
        }
    });
    if (currentBlock) rawBlocks.push(currentBlock);

    let corrections = [];
    let allQuestionsHtml = [];

    rawBlocks.forEach((blockLines) => {
        let q = "", opts = [], ans = "", justif = "";
        
        blockLines.forEach(l => {
            if (/^\d+[\.\)\s]/i.test(l) || /^\d+$/i.test(l)) {
                q = l;
            } 
            else if (/^[A-E][\.\)\s]/i.test(l)) {
                opts.push(l);
            } 
            else if (l.toLowerCase().replace(/[éèêë]/g, 'e').includes("reponse")) {
                let indexDeuxPoints = l.indexOf(':');
                if (indexDeuxPoints !== -1) {
                    ans = l.substring(indexDeuxPoints + 1).trim();
                } else {
                    ans = "?";
                }
            } 
            else if (l.toLowerCase().includes("justification")) {
                let indexDeuxPoints = l.indexOf(':');
                if (indexDeuxPoints !== -1) {
                    justif = l.substring(indexDeuxPoints + 1).trim();
                } else {
                    justif = "";
                }
            }
        });

        if (q) {
            let qNum = corrections.length + 1;
            corrections.push({ n: qNum, r: ans, j: justif });
            
            let questionLinesHtml = [];
            questionLinesHtml.push(`<span class="q-text">${q}</span>`);
            opts.forEach(o => {
                questionLinesHtml.push(`<span class="opt">${o}</span>`);
            });
            allQuestionsHtml.push(questionLinesHtml);
        }
    });

    const MAX_ZONE_HEIGHT_MM = 212; 
    let pageNum = 1;
    
    let currentPage = createPageElement(titre, pageNum);
    container.appendChild(currentPage);
    let currentContentArea = currentPage.querySelector('.content-area');
    let currentHeightMM = 45; 

    allQuestionsHtml.forEach((elementsArray, qIdx) => {
        let qBox = document.createElement('div');
        qBox.className = 'question-box';
        currentContentArea.appendChild(qBox);

        elementsArray.forEach((elHtml, lineIdx) => {
            ghost.innerHTML = elHtml;
            const elHeightMM = ghost.offsetHeight * 0.264583;

            if (currentHeightMM + elHeightMM > MAX_ZONE_HEIGHT_MM) {
                pageNum++;
                currentPage = createPageElement(titre, pageNum);
                container.appendChild(currentPage);
                currentContentArea = currentPage.querySelector('.content-area');
                currentHeightMM = 0;

                qBox = document.createElement('div');
                qBox.className = 'question-box';
                currentContentArea.appendChild(qBox);
            }

            qBox.innerHTML += elHtml;
            currentHeightMM += elHeightMM;
        });

        currentHeightMM += 6; 
    });

    pageNum++;
    let corrPage = createPageElement(titre, pageNum, "PROPOSITION DE CORRECTION");
    container.appendChild(corrPage);
    let corrContentArea = corrPage.querySelector('.content-area');
    let corrHeightMM = 45;

    for (let i = 0; i < corrections.length; i += 10) {
        const chunk = corrections.slice(i, i + 10);
        let tableHtml = `<table class="corr-table"><tr class="row-num">`;
        chunk.forEach(c => tableHtml += `<td>Q${c.n}</td>`);
        tableHtml += `</tr><tr class="row-ans">`;
        chunk.forEach(c => tableHtml += `<td>${c.r}</td>`);
        tableHtml += `</tr></table>`;

        ghost.innerHTML = tableHtml;
        const tableHeightMM = ghost.offsetHeight * 0.264583;

        if (corrHeightMM + tableHeightMM > MAX_ZONE_HEIGHT_MM) {
            pageNum++;
            corrPage = createPageElement(titre, pageNum, "PROPOSITION DE CORRECTION (Suite)");
            container.appendChild(corrPage);
            corrContentArea = corrPage.querySelector('.content-area');
            corrHeightMM = 45;
        }
        corrContentArea.innerHTML += tableHtml;
        corrHeightMM += tableHeightMM + 5;
    }

    let hasJustifications = corrections.some(c => c.j);
    if (hasJustifications) {
        let sectionHeaderHtml = `<div class="justif-section"><div class="justif-title">Justifications et Explications</div></div>`;
        ghost.innerHTML = sectionHeaderHtml;
        const sectionHeaderHeightMM = ghost.offsetHeight * 0.264583;

        if (corrHeightMM + sectionHeaderHeightMM > MAX_ZONE_HEIGHT_MM) {
            pageNum++;
            corrPage = createPageElement(titre, pageNum, "JUSTIFICATIONS & EXPLICATIONS");
            container.appendChild(corrPage);
            corrContentArea = corrPage.querySelector('.content-area');
            corrHeightMM = 45;
        } else {
            corrContentArea.innerHTML += sectionHeaderHtml;
            corrHeightMM += sectionHeaderHeightMM;
        }

        let targetSection = corrContentArea.querySelector('.justif-section') || corrContentArea;

        corrections.forEach(c => {
            if (c.j) {
                let itemHtml = `<div class="justif-item"><strong>Q${c.n} :</strong> ${c.j}</div>`;
                ghost.innerHTML = itemHtml;
                const itemHeightMM = ghost.offsetHeight * 0.264583;

                if (corrHeightMM + itemHeightMM > MAX_ZONE_HEIGHT_MM) {
                    pageNum++;
                    corrPage = createPageElement(titre, pageNum, "JUSTIFICATIONS & EXPLICATIONS (Suite)");
                    container.appendChild(corrPage);
                    corrContentArea = corrPage.querySelector('.content-area');
                    
                    corrContentArea.innerHTML += `<div class="justif-section"></div>`;
                    targetSection = corrContentArea.querySelector('.justif-section');
                    corrHeightMM = 45;
                }
                targetSection.innerHTML += itemHtml;
                corrHeightMM += itemHeightMM;
            }
        });
    }

    const allPages = container.querySelectorAll('.page');
    allPages.forEach((p) => {
        p.querySelector('.p-tot').innerText = allPages.length;
    });

    if (typeof MathJax !== 'undefined') {
        MathJax.typesetPromise();
    }
}
</script>
</body>
</html>
